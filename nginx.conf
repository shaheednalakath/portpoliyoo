event{}

http {
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
       
        }
        location /css/ {
            try_files $uri =404;
        }

        location /js/ {
            try_files $uri =404;
        }
    }